services:
  # Backend API
  - type: web
    name: startup-tracker-api
    env: node
    region: oregon
    plan: free
    buildCommand: cd apps/api && npm install && npm run build && node init-db.js
    startCommand: cd apps/api && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: API_VERSION
        value: v1
      - key: DATABASE_URL
        fromDatabase:
          name: startup-tracker-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://startup-tracker-web.vercel.app
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
    healthCheckPath: /api/v1/health

databases:
  - name: startup-tracker-db
    databaseName: startup_tracker
    plan: free
    region: oregon
